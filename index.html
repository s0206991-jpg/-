<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9人暗夜明牌局 - 多裝置多人聯網版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --primary: #e63946;
            --text: #f1faee;
            --accent: #457b9d;
            --good: #00ffcc;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 500px;
            background: var(--card-bg); border-radius: 16px;
            padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1, h2, h3 { color: var(--primary); margin-top: 0; }
        button {
            background-color: var(--primary); color: white;
            border: none; padding: 14px 28px; font-size: 16px;
            font-weight: bold; border-radius: 8px; cursor: pointer;
            margin-top: 15px; width: 100%; transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button.btn-secondary { background-color: var(--accent); }
        button.btn-vote { background-color: #f4a261; }
        .hidden { display: none !important; }
        .role-card {
            background: #2a2a35; padding: 20px; border-radius: 12px;
            margin: 20px 0; border: 2px solid var(--accent);
            font-size: 24px; font-weight: bold;
        }
        select, input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #2a2a35; color: white;
            border: 1px solid var(--accent); border-radius: 6px;
            font-size: 16px;
        }
        .log-box {
            background: #0f0f13; text-align: left; padding: 12px;
            border-radius: 8px; max-height: 150px; overflow-y: auto;
            font-size: 14px; color: #a8dadc; line-height: 1.5;
        }
        .status-board {
            background: #0f0f13; padding: 10px; border-radius: 8px;
            margin: 15px 0; text-align: left; font-size: 14px;
        }
        .player-line { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #2a2a35; }
        .player-line:last-child { border-bottom: none; }
        .dead { text-decoration: line-through; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div id="lobby-screen">
        <h1>🐺 9人暗夜明牌局</h1>
        <p style="color:#aaa;">各自用手機連線，無需任何上帝法官</p>
        <input type="text" id="user-name" placeholder="請輸入你的暱稱">
        <div style="margin: 20px 0; border-top: 1px solid #333; padding-top: 10px;">
            <input type="number" id="room-id-input" placeholder="欲加入的 4 位數房號">
            <button onclick="joinRoom()">加入現有房間</button>
        </div>
        <div style="font-size: 14px; color: #ccc;">或者</div>
        <button class="btn-secondary" onclick="createRoom()">🔑 創建新房間房間</button>
    </div>

    <div id="waiting-screen" class="hidden">
        <h2>房間號碼：<span id="display-room-id" style="color:var(--good)">----</span></h2>
        <p>當前等候室玩家 (<span id="current-count">0</span>/9人)：</p>
        <div id="player-list-box" class="status-board"></div>
        <p id="host-hint" style="color: #aaa; font-size:14px;"></p>
        <button id="start-game-btn" class="hidden" onclick="hostTriggerStart()">🚀 全員到齊，開啟對局</button>
    </div>

    <div id="reveal-screen" class="hidden">
        <h2>你的身分底牌</h2>
        <p>確認四周無人查看後，點選看牌</p>
        <button id="btn-toggle-view" onclick="toggleRoleCard()">👁️ 顯示/隱藏底牌</button>
        <div id="my-role-card" class="role-card hidden"></div>
        <p id="my-role-desc" style="color:var(--good); font-size:14px;" class="hidden"></p>
        <div style="margin-top: 30px; font-size:14px; color:#aaa;">等待其他人確認底牌...</div>
    </div>

    <div id="night-wait-screen" class="hidden">
        <h1 style="color: #a29bfe;">🌙 天黑請閉眼</h1>
        <p>全場玩家請緊閉雙眼。</p>
        <p id="night-wait-text" style="color: var(--accent); font-weight:bold;">等待其他在夜間有功能的職位行動...</p>
        <div id="night-action-box" class="hidden">
            <div id="dynamic-action-form"></div>
            <button onclick="submitMyNightAction()">🔒 送出並鎖定夜間決策</button>
        </div>
    </div>

    <div id="day-screen" class="hidden">
        <h1 id="day-round-title">☀️ 天亮請睜眼</h1>
        
        <div class="role-card" id="day-death-banner" style="border-color: #e63946; font-size:18px;"></div>
        
        <h3>🔮 昨晚明牌事件回報：</h3>
        <div class="log-box" id="day-log-box"></div>

        <div class="status-board">
            <h4>📊 當前全場玩家存活狀態：</h4>
            <div id="day-players-status"></div>
        </div>

        <div id="voting-zone" style="background:#251f3d; padding:15px; border-radius:10px; border:1px solid var(--accent); margin-top:15px;">
            <h3 style="color: var(--good); font-size: 16px;">🗳️ 白天公投放逐階段</h3>
            <div id="vote-ui">
                <p style="font-size: 13px; color: #aaa;">請在下方選擇你今天要投出去的號碼：</p>
                <select id="my-vote-target"></select>
                <button class="btn-vote" id="btn-submit-vote" onclick="submitMyVote()">🗳️ 投出這一票</button>
            </div>
            <div id="vote-wait-msg" class="hidden" style="color: var(--good); font-size:14px;">已成功投票！等待其他活著的玩家投票完成...</div>
        </div>
    </div>

    <div id="gameover-screen" class="hidden">
        <h1 id="gameover-title" style="font-size: 30px;">🏆 遊戲結束</h1>
        <div class="role-card" id="gameover-banner" style="font-size: 20px;"></div>
        <h3>📋 本局全場真實底牌揭曉：</h3>
        <div class="status-board" id="gameover-reveal-box"></div>
        <button onclick="location.reload()">🔄 回到大廳</button>
    </div>
</div>

<script>
    // --- ⚠️請注意：此為 Firebase 臨時公用測試庫，僅供即時測試，正式上線建議換成你專屬的 Firebase Config。 ---
    const firebaseConfig = {
        databaseURL: "https://werewolf-9p-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 原始 9 人配置
    const ROLES_POOL = ['狼人', '狼人', '狼人', '預言家', '女巫', '魔術師', '平民', '平民', '平民'];

    // 玩家個人狀態與全域狀態快取
    let roomId = null;
    let myPlayerId = null; 
    let myName = "";
    let myRole = "";
    let isHost = false;
    let roomRef = null;
    let currentRoomState = {};

    // 1. 創建房間
    function createRoom() {
        myName = document.getElementById('user-name').value.trim();
        if(!myName) { alert("請先輸入你的暱稱！"); return; }
        
        roomId = Math.floor(1000 + Math.random() * 9000).toString(); // 生成 4 位數房號
        isHost = true;
        myPlayerId = 1; // 房主固定為 1 號

        roomRef = database.ref('rooms/' + roomId);
        
        // 洗牌算法
        let shuffled = [...ROLES_POOL].sort(() => Math.random() - 0.5);

        let initialData = {
            meta: { roomId: roomId, hostId: 1, status: "waiting", round: 1 },
            roles: shuffled,
            players: {
                1: { id: 1, name: myName, role: shuffled[0], isDead: false, connected: true }
            },
            nightActions: { placeholder: true },
            votes: { placeholder: true }
        };

        roomRef.set(initialData).then(() => {
            enterWaitingRoom();
        });
    }

    // 2. 加入房間
    function joinRoom() {
        myName = document.getElementById('user-name').value.trim();
        const inputId = document.getElementById('room-id-input').value.trim();
        if(!myName || !inputId) { alert("請填寫暱稱與 4 位數房號！"); return; }
        
        roomId = inputId;
        roomRef = database.ref('rooms/' + roomId);

        roomRef.once('value').then(snapshot => {
            if(!snapshot.exists()) { alert("找不到該房間！請確認房號是否正確。"); return; }
            let data = snapshot.val();
            if(data.meta.status !== "waiting") { alert("該房間遊戲已經開始！"); return; }
            
            let currentPlayers = data.players ? Object.keys(data.players).length : 0;
            if(currentPlayers >= 9) { alert("房間已滿 9 人！"); return; }

            myPlayerId = currentPlayers + 1; // 依序獲得 2~9 號
            myRole = data.roles[myPlayerId - 1];

            roomRef.child('players/' + myPlayerId).set({
                id: myPlayerId,
                name: myName,
                role: myRole,
                isDead: false,
                connected: true
            }).then(() => {
                isHost = false;
                enterWaitingRoom();
            });
        });
    }

    // 3. 進入等候室並監聽
    function enterWaitingRoom() {
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('waiting-screen').classList.remove('hidden');
        document.getElementById('display-room-id').innerText = roomId;

        if (isHost) {
            document.getElementById('host-hint').innerText = "👑 你是房主。請等候 9 人到齊後點擊下方按鈕啟動。";
        } else {
            document.getElementById('host-hint').innerText = "💤 已成功連線。請等待房主啟動遊戲...";
        }

        // 開始即時同步等候室名單與遊戲狀態
        roomRef.on('value', snapshot => {
            if(!snapshot.exists()) return;
            let data = snapshot.val();
            currentRoomState = data;

            // 更新名單
            let pBox = document.getElementById('player-list-box');
            pBox.innerHTML = "";
            let count = 0;
            for(let id in data.players) {
                let p = data.players[id];
                pBox.innerHTML += `<div class="player-line"><span>[${p.id}號] ${p.name}</span><span style="color:var(--good)">已連線聯網 ●</span></div>`;
                count++;
            }
            document.getElementById('current-count').innerText = count;

            if (isHost && count === 9 && data.meta.status === "waiting") {
                document.getElementById('start-game-btn').classList.remove('hidden');
            }

            // 狀態機跳轉分流
            if(data.meta.status === "reveal" && myPlayerId) {
                myRole = data.players[myPlayerId].role;
                openRevealScreen();
            }
            if(data.meta.status === "night") {
                openNightScreen();
            }
            if(data.meta.status === "day") {
                openDayScreen();
            }
            if(data.meta.status === "gameover") {
                openGameOverScreen();
            }
        });
    }

    // 房主啟動分發身分
    function hostTriggerStart() {
        roomRef.child('meta/status').set("reveal");
    }

    // 4. 查看底牌畫面
    function openRevealScreen() {
        document.getElementById('waiting-screen').classList.add('hidden');
        document.getElementById('reveal-screen').classList.remove('hidden');
        document.getElementById('my-role-card').innerText = myRole;
        document.getElementById('my-role-desc').innerText = getRoleDescription(myRole);

        // 如果是房主，多幫忙監聽是否所有人看完牌，自動切入黑夜
        if(isHost) {
            setTimeout(() => {
                roomRef.child('meta/status').set("night");
            }, 10000); // 10秒後全自動強制全體天黑，防拖延
        }
    }

    function toggleRoleCard() {
        document.getElementById('my-role-card').classList.toggle('hidden');
        document.getElementById('my-role-desc').classList.toggle('hidden');
    }

    function getRoleDescription(r) {
        if (r === '狼人') return "🐺 狼人陣營。每晚與狼人隊友共商擊殺一名玩家。";
        if (r === '預言家') return "🔮 神職。每晚可查驗一名存活玩家的真實陣營。";
        if (r === '女巫') return "🧪 神職。擁有解藥與毒藥各一瓶，今晚可選擇是否發動。";
        if (r === '魔術師') return "🃏 神職。每晚可交換兩位玩家的號碼命運（今晚被交換者將互換受技能影響）。";
        return "👷 平民陣營。夜間無功能，請閉眼安睡。白天請透過發言與公投抓出狼人。";
    }

    // 5. 夜間行動畫面（全裝置異步盲點選）
    function openNightScreen() {
        document.getElementById('reveal-screen').classList.add('hidden');
        document.getElementById('day-screen').classList.add('hidden');
        document.getElementById('night-wait-screen').classList.remove('hidden');

        let me = currentRoomState.players[myPlayerId];
        let form = document.getElementById('dynamic-action-form');
        form.innerHTML = "";

        if (me.isDead) {
            document.getElementById('night-wait-text').innerText = "💀 你已出局，請在黑夜保持安靜。";
            document.getElementById('night-action-box').classList.add('hidden');
            return;
        }

        document.getElementById('night-wait-text').innerText = "🌌 請秘密在下方執行你的裝置夜間行動：";
        document.getElementById('night-action-box').classList.remove('hidden');

        // 依據角色動態生成各自手機畫面
        if (myRole === '狼人') {
            form.innerHTML = `<p>🐺 狼人請睜眼。請點選今晚要集中狙擊擊殺的目標：</p>
                              <select id="act-wolf">${generateAliveSelectOptions()}</select>`;
        } else if (myRole === '預言家') {
            form.innerHTML = `<p>🔮 預言家請睜眼。請選擇今晚你想查驗陣營的活著玩家：</p>
                              <select id="act-seer">${generateAliveSelectOptions(myPlayerId)}</select>`;
        } else if (myRole === '女巫') {
            form.innerHTML = `<p>🧪 是否使用解藥守護今晚狼刀受害者？</p>
                              <select id="act-witch-heal"><option value="no">否</option><option value="yes">是</option></select>
                              <p>💀 是否使用毒藥毒殺一名玩家？</p>
                              <select id="act-witch-poison"><option value="none">不使用毒藥</option>${generateAliveSelectOptions(myPlayerId)}</select>`;
        } else if (myRole === '魔術師') {
            form.innerHTML = `<p>🃏 魔術師請指定要調換命運的【第一位】玩家：</p>
                              <select id="act-mag1">${generateAliveSelectOptions()}</select>
                              <p>🃏 魔術師請指定要調換命運的【第二位】玩家：</p>
                              <select id="act-mag2">${generateAliveSelectOptions()}</select>`;
        } else {
            form.innerHTML = `<p>💤 你是普通平民。今晚沒有夜間技能，請閉眼安睡。</p>`;
        }
    }

    function generateAliveSelectOptions(excludeId = null) {
        let html = "";
        for(let id in currentRoomState.players) {
            let p = currentRoomState.players[id];
            if (!p.isDead && p.id !== excludeId) {
                html += `<option value="${p.id}">[${p.id}號] ${p.name}</option>`;
            }
        }
        return html;
    }

    // 送出個人裝置黑夜決定
    function submitMyNightAction() {
        let myAction = { role: myRole };
        
        if (myRole === '狼人') {
            myAction.wolfTarget = parseInt(document.getElementById('act-wolf').value);
        } else if (myRole === '預言家') {
            myAction.seerTarget = parseInt(document.getElementById('act-seer').value);
        } else if (myRole === '女巫') {
            myAction.witchHeal = document.getElementById('act-witch-heal').value === 'yes';
            let pVal = document.getElementById('act-witch-poison').value;
            myAction.witchPoison = pVal === 'none' ? null : parseInt(pVal);
        } else if (myRole === '魔術師') {
            myAction.magicianSwap1 = parseInt(document.getElementById('act-mag1').value);
            myAction.magicianSwap2 = parseInt(document.getElementById('act-mag2').value);
        }

        document.getElementById('night-action-box').innerHTML = "<p style='color:var(--good)'>✓ 決策成功上傳雲端！等待其他人閉眼結束...</p>";

        // 上傳至雲端該玩家的專屬格子
        roomRef.child('nightActions/' + myPlayerId).set(myAction).then(() => {
            if (isHost) {
                // 房主負責在背景輪詢，看看是不是所有「活著且有夜間功能的人」都交卷了
                checkAndExecuteNightResolution();
            }
        });
    }

    // 房主雲端後台交叉大結算（完全替代原上帝法官）
    function checkAndExecuteNightResolution() {
        roomRef.child('nightActions').once('value', snapshot => {
            let actions = snapshot.val() || {};
            let aliveRolesWithActions = 0;
            let submittedCount = 0;

            for(let id in currentRoomState.players) {
                let p = currentRoomState.players[id];
                if(!p.isDead) {
                    aliveRolesWithActions++; // 9人局全體皆可提交（含平民安睡確認）
                    if(actions[id]) submittedCount++;
                }
            }

            // 所有人都在自己手機點選送出了！
            if (submittedCount >= aliveRolesWithActions) {
                executeCloudNightLogic(actions);
            }
        });
    }

    function executeCloudNightLogic(actions) {
        let logs = [];
        let deadSet = new Set();

        // 提取各功能交卷數據
        let wolfTarget = null;
        let seerTarget = null;
        let witchHeal = false;
        let witchPoison = null;
        let mag1 = null; let mag2 = null;

        for(let id in actions) {
            let act = actions[id];
            if(act.role === '狼人') wolfTarget = act.wolfTarget;
            if(act.role === '預言家') seerTarget = act.seerTarget;
            if(act.role === '女巫') { witchHeal = act.witchHeal; witchPoison = act.witchPoison; }
            if(act.role === '魔術師') { mag1 = act.magicianSwap1; mag2 = act.magicianSwap2; }
        }

        // 1. 魔術師命運大對調
        if (mag1 && mag2 && mag1 !== mag2) {
            logs.push(`🃏 魔術師今晚施展法術，交換了 [${mag1}號] 與 [${mag2}號] 的命運走勢。`);
            const swapFn = (t) => {
                if (t === mag1) return mag2;
                if (t === mag2) return mag1;
                return t;
            };
            wolfTarget = swapFn(wolfTarget);
            seerTarget = swapFn(seerTarget);
            witchPoison = swapFn(witchPoison);
        }

        // 2. 狼刀與解藥交叉判定
        if (wolfTarget) {
            if (witchHeal) {
                logs.push(`🧪 女巫今晚開了解藥，將被狼人狙擊瀕死的人救了回來。`);
            } else {
                deadSet.add(wolfTarget);
            }
        }

        // 3. 毒藥判定
        if (witchPoison) {
            deadSet.add(witchPoison);
            logs.push(`🧪 女巫今晚使用了毒藥，一人在黑夜中暴斃出局。`);
        }

        // 4. 預言家驗人公告（直接洗成明牌日誌，全場看得到）
        if (seerTarget) {
            let targetP = currentRoomState.players[seerTarget];
            let sideResult = targetP.role === '狼人' ? "【狼人陣營】❌" : "【好人陣營】⭕";
            logs.push(`🔮 預言家查驗回報：[${seerTarget}號] ${targetP.name} 身分底牌為：${sideResult}`);
        }

        // 寫入死亡狀態回雲端
        let updates = {};
        deadSet.forEach(id => {
            updates[`players/${id}/isDead`] = true;
        });

        // 紀錄破曉結果橫幅文字
        let bannerText = "";
        if (deadSet.size === 0) {
            bannerText = "昨晚是個平安夜！☀️ 沒有人出局。";
        } else {
            let deadNames = Array.from(deadSet).map(id => `[${id}號] ${currentRoomState.players[id].name} (底牌:${currentRoomState.players[id].role})`);
            bannerText = `🚨 昨晚不幸身亡出局：<br>${deadNames.join('、')}`;
        }

        updates['dayResult/banner'] = bannerText;
        updates['dayResult/logs'] = logs.length > 0 ? logs.map(l=>`• ${l}`).join('<br>') : '昨晚相安無事。';
        updates['meta/status'] = "day"; // 全網同步命令：強制所有人手機跳轉天亮

        roomRef.update(updates);
    }

    // 6. 白天討論與連線投票畫面
    function openDayScreen() {
        document.getElementById('night-wait-screen').classList.add('hidden');
        document.getElementById('day-screen').classList.remove('hidden');

        // 重置投票顯示區
        document.getElementById('vote-ui').classList.remove('hidden');
        document.getElementById('vote-wait-msg').classList.add('hidden');

        // 拉取最新的天亮同步資訊
        roomRef.once('value', snapshot => {
            let data = snapshot.val();
            document.getElementById('day-round-title').innerText = `☀️ 第 ${data.meta.round} 天 白天放逐討論`;
            document.getElementById('day-death-banner').innerHTML = data.dayResult.banner;
            document.getElementById('day-log-box').innerHTML = data.dayResult.logs;

            // 渲染全場玩家存活面板
            let statusBox = document.getElementById('day-players-status');
            statusBox.innerHTML = "";
            for(let id in data.players) {
                let p = data.players[id];
                statusBox.innerHTML += `<div class="player-line ${p.isDead?'dead':''}">
                    <span><strong>[${p.id}號] ${p.name}</strong></span>
                    <span>${p.isDead?'💀 已出局':'🟢 存活'}</span>
                </div>`;
            }

            // 自己死了就不能投票
            if (data.players[myPlayerId].isDead) {
                document.getElementById('vote-ui').innerHTML = "<p style='color:var(--primary)'>💀 你已死亡出局，白天僅有旁聽權利，無法參與放逐投票。</p>";
                return;
            }

            // 建立投票下拉清單
            let voteSel = document.getElementById('my-vote-target');
            voteSel.innerHTML = `<option value="none">❌ 放棄投票 / 平票無人出局</option>`;
            for(let id in data.players) {
                let p = data.players[id];
                if (!p.isDead) {
                    voteSel.innerHTML += `<option value="${p.id}">放逐 [${p.id}號] ${p.name}</option>`;
                }
            }
        });
    }

    // 自主點選自己裝置的公投按鈕
    function submitMyVote() {
        let vTarget = document.getElementById('my-vote-target').value;
        document.getElementById('vote-ui').classList.add('hidden');
        document.getElementById('vote-wait-msg').classList.remove('hidden');

        roomRef.child('votes/' + myPlayerId).set(vTarget).then(() => {
            if (isHost) {
                // 房主後台監聽是否所有活人投完了
                checkAndExecuteVoteResolution();
            }
        });
    }

    function checkAndExecuteVoteResolution() {
        roomRef.child('votes').once('value', snapshot => {
            let votes = snapshot.val() || {};
            let aliveCount = 0;
            let currentVoteCount = 0;

            for(let id in currentRoomState.players) {
                if(!currentRoomState.players[id].isDead) {
                    aliveCount++;
                    if(votes[id]) currentVoteCount++;
                }
            }

            if (currentVoteCount >= aliveCount) {
                executeCloudVoteLogic(votes);
            }
        });
    }

    function executeCloudVoteLogic(votes) {
        let tally = {};
        for(let voterId in votes) {
            let target = votes[voterId];
            if(target !== "none") {
                tally[target] = (tally[target] || 0) + 1;
            }
        }

        // 抓出最高票
        let maxVotes = 0;
        let exileTargetId = null;
        let isTie = false;

        for(let targetId in tally) {
            if(tally[targetId] > maxVotes) {
                maxVotes = tally[targetId];
                exileTargetId = targetId;
                isTie = false;
            } else if(tally[targetId] === maxVotes) {
                isTie = true;
            }
        }

        let updates = {};
        if (exileTargetId && !isTie) {
            updates[`players/${exileTargetId}/isDead`] = true;
            alert(`🔨 雲端開票結果：[${exileTargetId}號] 玩家累積最高票，被白天公投放逐！`);
        } else {
            alert("🔨 白天公投判定平票或無人投票，本輪無人出局！");
        }

        // 每次白天出人後，立刻重新拉回背景，交叉比對是否有任何一方勝利
        roomRef.child('players').once('value', pSnap => {
            let latestPlayers = pSnap.val();
            let aliveWolves = 0;
            let aliveGoods = 0;

            for(let id in latestPlayers) {
                let p = latestPlayers[id];
                if (!p.isDead) {
                    if (p.role === '狼人') aliveWolves++;
                    else aliveGoods++;
                }
            }

            // 終局判定
            if (aliveWolves === 0) {
                updates['meta/status'] = "gameover";
                updates['gameover/title'] = "👑 好人陣營大獲全勝！";
                updates['gameover/banner'] = "全場所有潛伏的狼人已全數被公投放逐並肅清！";
                roomRef.update(updates);
            } else if (aliveWolves >= aliveGoods) {
                updates['meta/status'] = "gameover";
                updates['gameover/title'] = "🩸 狼人陣營屠城獲勝！";
                updates['gameover/banner'] = `狼人存活數 (${aliveWolves}人) 已大於或等於好人總數 (${aliveGoods}人)，好人無力回天！`;
                roomRef.update(updates);
            } else {
                // 遊戲還沒結束，清空昨夜與昨天的投票記錄，天數+1，強制推回天黑
                updates['nightActions'] = { placeholder: true };
                updates['votes'] = { placeholder: true };
                updates['meta/round'] = currentRoomState.meta.round + 1;
                updates['meta/status'] = "night"; // 命令所有連線手機重回天黑！
                roomRef.update(updates);
            }
        });
    }

    // 7. 遊戲結算終點畫面
    function openGameOverScreen() {
        document.getElementById('day-screen').classList.add('hidden');
        document.getElementById('gameover-screen').classList.remove('hidden');

        roomRef.once('value', snapshot => {
            let data = snapshot.val();
            document.getElementById('gameover-title').innerText = data.gameover.title;
            document.getElementById('gameover-banner').innerText = data.gameover.banner;

            let revealBox = document.getElementById('gameover-reveal-box');
            revealBox.innerHTML = "";
            for(let id in data.players) {
                let p = data.players[id];
                let life = p.isDead ? "💀 戰死出局" : "🟢 活到最後";
                revealBox.innerHTML += `<div class="player-line">
                    <span><strong>[${p.id}號] ${p.name}</strong></span>
                    <span>真實底牌：<span style="color:var(--primary)">${p.role}</span> (${life})</span>
                </div>`;
            }
            
            // 刪除房間以清空雲端垃圾快取
            if(isHost) {
                roomRef.remove();
            }
        });
    }
</script>

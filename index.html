<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗夜明牌局 - 狼人殺聯網傳閱版</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --primary: #e63946;
            --text: #f1faee;
            --accent: #457b9d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            box-sizing: border-box;
            text-align: center;
        }
        h1, h2, h3 { color: var(--primary); margin-top: 0; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .hidden { display: none !important; }
        .role-card {
            background: #2a2a35;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 2px solid var(--accent);
            font-size: 24px;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2a35;
            color: white;
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .log-box {
            background: #0f0f13;
            text-align: left;
            padding: 12px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 14px;
            color: #a8dadc;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 畫面 1：遊戲初始與座位綁定 -->
    <div id="setup-screen">
        <h1>暗夜明牌局 (9人)</h1>
        <p>請將手機傳給每位玩家輸入名字以抽取底牌</p>
        <h2 id="player-setup-title">請 1 號玩家拿著手機</h2>
        <input type="text" id="player-name" placeholder="輸入你的名字或暱稱">
        <button onclick="lockInPlayer()">確認身分並抽牌</button>
    </div>

    <!-- 畫面 2：隱私遮罩（防止下一個人偷看） -->
    <div id="privacy-screen" class="hidden">
        <h1>請傳遞手機</h1>
        <h2 id="privacy-target">請將手機交給下一個人</h2>
        <button onclick="revealRoleScreen()">我已拿到手機，點擊查看</button>
    </div>

    <!-- 畫面 3：顯示身分牌 -->
    <div id="role-screen" class="hidden">
        <h2 id="role-owner-name">玩家身分</h2>
        <p>確認四下無人後，點擊下方按鈕看牌</p>
        <button id="btn-toggle-role" onclick="toggleRoleVisibility()">顯示我的底牌</button>
        <div id="role-card-display" class="role-card hidden"></div>
        <button id="btn-role-done" onclick="nextPlayerRole()" class="hidden">確認，傳給下一位</button>
    </div>

    <!-- 畫面 4：天黑夜間行動階段（輪流傳閱點選） -->
    <div id="night-screen" class="hidden">
        <h1>🌙 天黑請閉眼</h1>
        <h2 id="night-player-title">請 1 號玩家拿著手機</h2>
        <p id="night-prompt">準備進入你的夜間行動</p>
        <button onclick="startNightAction()">開始行動</button>
    </div>

    <!-- 畫面 5：各職業實際夜間操作介面 -->
    <div id="action-screen" class="hidden">
        <h2 id="action-title">夜間行動中</h2>
        <div id="action-form">
            <!-- 動態插入各職能下拉選單 -->
        </div>
        <button onclick="submitNightAction()">完成行動並鎖定</button>
    </div>

    <!-- 畫面 6：天亮請睜眼（結算畫面） -->
    <div id="day-screen" class="hidden">
        <h1>☀️ 天亮請睜眼</h1>
        <div class="role-card" id="day-result" style="border-color: #e63946;"></div>
        <h3>昨晚事件記錄（明牌提示）：</h3>
        <div class="log-box" id="day-logs"></div>
        <button onclick="restartGame()">重新開始新對局</button>
    </div>
</div>

<script>
    // 1. 初始化 9人陣容：3狼、1預、1女、1魔、3民 (無獵人)
    const ROLES_POOL = ['狼人', '狼人', '狼人', '預言家', '女巫', '魔術師', '平民', '平民', '平民'];
    let players = []; 
    let currentSetupIndex = 0;
    let currentNightIndex = 0;

    // 夜間暫存決策
    let nightData = {
        wolfTarget: null,
        seerTarget: null,
        witchHeal: false,
        witchPosion: null,
        magicianSwap1: null,
        magicianSwap2: null
    };

    // 洗牌演算法 (Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }
    const shuffledRoles = shuffle([...ROLES_POOL]);

    // 處理設置玩家階段
    function lockInPlayer() {
        const nameInput = document.getElementById('player-name');
        const name = nameInput.value.trim() || `玩家 ${currentSetupIndex + 1}`;
        
        players.push({
            id: currentSetupIndex + 1,
            name: name,
            role: shuffledRoles[currentSetupIndex]
        });

        nameInput.value = '';
        showPrivacyScreen(currentSetupIndex, 'setup');
    }

    // 顯示傳遞手機隱私遮罩
    function showPrivacyScreen(currentIndex, mode) {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('role-screen').classList.add('hidden');
        document.getElementById('night-screen').classList.add('hidden');
        document.getElementById('action-screen').classList.add('hidden');
        
        const privacy = document.getElementById('privacy-screen');
        const targetText = document.getElementById('privacy-target');
        privacy.classList.remove('hidden');

        if (mode === 'setup') {
            if (currentIndex < 8) {
                targetText.innerText = `請將手機交給 ${currentIndex + 2} 號玩家`;
                privacy.querySelector('button').setAttribute('onclick', 'revealRoleScreen()');
            } else {
                targetText.innerText = `所有人抽牌完畢！請將手機交回 1 號玩家，準備進入天黑`;
                privacy.querySelector('button').setAttribute('onclick', 'goToNightPhase()');
            }
        } else if (mode === 'night') {
            if (currentIndex < 8) {
                targetText.innerText = `請將手機交給下一個順位：${players[currentIndex + 1].name}`;
                privacy.querySelector('button').setAttribute('onclick', 'revealNightScreen()');
            } else {
                targetText.innerText = `所有人行動完畢！請點擊查看天亮結算結果`;
                privacy.querySelector('button').setAttribute('onclick', 'processDaybreak()');
            }
        }
    }

    // 進入顯示身分畫面
    function revealRoleScreen() {
        document.getElementById('privacy-screen').classList.add('hidden');
        const screen = document.getElementById('role-screen');
        screen.classList.remove('hidden');
        
        document.getElementById('role-owner-name').innerText = `${players[currentSetupIndex].name} 的身分`;
        const card = document.getElementById('role-card-display');
        card.innerText = players[currentSetupIndex].role;
        card.classList.add('hidden');
        
        document.getElementById('btn-toggle-role').classList.remove('hidden');
        document.getElementById('btn-role-done').classList.add('hidden');
    }

    function toggleRoleVisibility() {
        const card = document.getElementById('role-card-display');
        card.classList.toggle('hidden');
        document.getElementById('btn-role-done').classList.remove('hidden');
    }

    function nextPlayerRole() {
        currentSetupIndex++;
        if (currentSetupIndex < 9) {
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('player-setup-title').innerText = `請 ${currentSetupIndex + 1} 號玩家拿著手機`;
        }
    }

    // 進入夜間閉眼階段
    function goToNightPhase() {
        document.getElementById('privacy-screen').classList.add('hidden');
        document.getElementById('night-screen').classList.remove('hidden');
        currentNightIndex = 0;
        updateNightScreenFields();
    }

    function updateNightScreenFields() {
        document.getElementById('night-player-title').innerText = `請 ${players[currentNightIndex].name} 拿著手機`;
    }

    function revealNightScreen() {
        document.getElementById('privacy-screen').classList.add('hidden');
        document.getElementById('night-screen').classList.remove('hidden');
        updateNightScreenFields();
    }

    // 依據玩家身分，在夜間動態生成「只有他自己看得到」的行動表單
    function startNightAction() {
        document.getElementById('night-screen').classList.add('hidden');
        const actionScreen = document.getElementById('action-screen');
        actionScreen.classList.remove('hidden');

        const p = players[currentNightIndex];
        document.getElementById('action-title').innerText = `${p.name} (你的身分: ${p.role})`;

        const form = document.getElementById('action-form');
        form.innerHTML = ''; // 清空舊內容

        if (p.role === '狼人') {
            form.innerHTML = `<p>🐺 狼人同伴們，請統一今晚要擊殺的目標：</p>
                <select id="wolf-select">${generatePlayerOptions()}</select>`;
        } else if (p.role === '預言家') {
            form.innerHTML = `<p>🔮 請選擇今晚要查驗的人：</p>
                <select id="seer-select">${generatePlayerOptions(p.id)}</select>`;
        } else if (p.role === '女巫') {
            form.innerHTML = `
                <p>🧪 是否使用解藥？</p>
                <select id="witch-heal"><option value="no">否</option><option value="yes">是</option></select>
                <p>💀 是否使用毒藥？(不毒人請選無)</p>
                <select id="witch-poison"><option value="none">無</option>${generatePlayerOptions(p.id)}</select>`;
        } else if (p.role === '魔術師') {
            form.innerHTML = `
                <p>🃏 請選擇要交換號碼的【第一位】玩家：</p>
                <select id="mag1">${generatePlayerOptions()}</select>
                <p>🃏 請選擇要交換號碼的【第二位】玩家：</p>
                <select id="mag2">${generatePlayerOptions()}</select>`;
        } else {
            // 平民
            form.innerHTML = `<p>💤 你是普通平民，今晚請安穩睡覺，無夜間技能。</p>`;
        }
    }

    function generatePlayerOptions(excludeId = null) {
        return players.map(p => {
            if (p.id === excludeId) return '';
            return `<option value="${p.id}">[${p.id}號] ${p.name}</option>`;
        }).join('');
    }

    // 提交並鎖定夜間決定
    function submitNightAction() {
        const p = players[currentNightIndex];
        
        if (p.role === '狼人') {
            nightData.wolfTarget = parseInt(document.getElementById('wolf-select').value);
        } else if (p.role === '預言家') {
            nightData.seerTarget = parseInt(document.getElementById('seer-select').value);
        } else if (p.role === '女巫') {
            nightData.witchHeal = document.getElementById('witch-heal').value === 'yes';
            const poisonVal = document.getElementById('witch-poison').value;
            nightData.witchPosion = poisonVal === 'none' ? null : parseInt(poisonVal);
        } else if (p.role === '魔術師') {
            nightData.magicianSwap1 = parseInt(document.getElementById('mag1').value);
            nightData.magicianSwap2 = parseInt(document.getElementById('mag2').value);
        }

        showPrivacyScreen(currentNightIndex, 'night');
        currentNightIndex++;
    }

    // 天亮結算（核心邏輯：計算狼刀、魔術師對調、女巫藥劑）
    function processDaybreak() {
        document.getElementById('privacy-screen').classList.add('hidden');
        document.getElementById('day-screen').classList.remove('hidden');

        let logs = [];
        let deadList = new Set();

        let finalWolfTarget = nightData.wolfTarget;
        let finalSeerTarget = nightData.seerTarget;
        let finalWitchPoison = nightData.witchPosion;

        // 1. 魔術師交換邏輯
        if (nightData.magicianSwap1 && nightData.magicianSwap2 && nightData.magicianSwap1 !== nightData.magicianSwap2) {
            logs.push(`🃏 魔術師發動技能，交換了 [${nightData.magicianSwap1}號] 與 [${nightData.magicianSwap2}號] 的命運。`);
            
            // 映射函數
            const swapMap = (target) => {
                if (target === nightData.magicianSwap1) return nightData.magicianSwap2;
                if (target === nightData.magicianSwap2) return nightData.magicianSwap1;
                return target;
            };

            finalWolfTarget = swapMap(finalWolfTarget);
            finalSeerTarget = swapMap(finalSeerTarget);
            finalWitchPoison = swapMap(finalWitchPoison);
        }

        // 2. 結算狼刀與女巫解藥
        if (finalWolfTarget) {
            if (nightData.witchHeal) {
                logs.push(`🧪 女巫使用了解藥，成功守護了被狼人盯上的人。`);
            } else {
                deadList.add(finalWolfTarget);
            }
        }

        // 3. 結算女巫毒藥
        if (finalWitchPoison) {
            deadList.add(finalWitchPoison);
            logs.push(`🧪 女巫使用了毒藥，一人在黑夜中倒下。`);
        }

        // 4. 預言家驗人回報（明牌顯示給全場看，符合暗夜明牌局設定）
        if (finalSeerTarget) {
            const targetPlayer = players.find(p => p.id === finalSeerTarget);
            const isEvil = targetPlayer.role === '狼人' ? '【狼人陣營】❌' : '【好人陣營】⭕';
            logs.push(`🔮 預言家昨晚查驗了 [${finalSeerTarget}號] ${targetPlayer.name}，結果為：${isEvil}`);
        }

        // 輸出天亮死亡結果
        const resultDisplay = document.getElementById('day-result');
        if (deadList.size === 0) {
            resultDisplay.innerHTML = "昨晚是個平安夜！☀️<br><span style='font-size:16px; color:#a8dadc;'>沒有人出局。</span>";
        } else {
            let deadNames = Array.from(deadList).map(id => {
                const p = players.find(x => x.id === id);
                return `[${p.id}號] ${p.name} (底牌: ${p.role})`;
            });
            resultDisplay.innerHTML = `昨晚死者為：<br><span style='color:#f4a261;'>${deadNames.join('、')}</span>`;
        }

        // 秀出全場明牌 Log Box
        document.getElementById('day-logs').innerHTML = logs.length > 0 ? logs.map(l => `• ${l}`).join('<br>') : '昨晚風平浪靜。';
    }

    function restartGame() {
        location.reload();
    }
</script>

</body>
</html>

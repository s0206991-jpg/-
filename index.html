<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗夜明牌局 - 10人完整對局版</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --primary: #e63946;
            --text: #f1faee;
            --accent: #457b9d;
            --success: #4ade80;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            box-sizing: border-box;
            text-align: center;
        }
        h1, h2, h3 { color: var(--primary); margin-top: 0; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .hidden { display: none !important; }
        .role-card {
            background: #2a2a35;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 2px solid var(--accent);
            font-size: 24px;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2a35;
            color: white;
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .log-box {
            background: #0f0f13;
            text-align: left;
            padding: 12px;
            border-radius: 8px;
            max-height: 220px;
            overflow-y: auto;
            font-size: 14px;
            color: #a8dadc;
            line-height: 1.6;
        }
        .skill-desc {
            font-size: 13px;
            color: #a8dadc;
            text-align: left;
            background: #15151a;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .dead-player {
            color: #888 !important;
            text-decoration: line-through;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>暗夜明牌局 (10人完整對局)</h1>
        <p>配置：3狼、3民、1預、1女、1叛徒、1調停者</p>
        <h2 id="player-setup-title">請 1 號玩家拿著手機</h2>
        <input type="text" id="player-name" placeholder="輸入你的名字或暱稱">
        <button onclick="lockInPlayer()">確認身分並抽牌</button>
    </div>

    <div id="privacy-screen" class="hidden">
        <h1>請傳遞手機</h1>
        <h2 id="privacy-target">請將手機交給下一個人</h2>
        <button onclick="revealRoleScreen()">我已拿到手機，點擊查看</button>
    </div>

    <div id="role-screen" class="hidden">
        <h2 id="role-owner-name">玩家身分</h2>
        <p>確認四下無人後，點擊下方按鈕看牌</p>
        <button id="btn-toggle-role" onclick="toggleRoleVisibility()">顯示我的底牌</button>
        <div id="role-card-display" class="role-card hidden"></div>
        <button id="btn-role-done" onclick="nextPlayerRole()" class="hidden">確認，傳給下一位</button>
    </div>

    <div id="night-screen" class="hidden">
        <h1 id="night-round-title">🌙 第 1 晚天黑請閉眼</h1>
        <h2 id="night-player-title">請玩家拿著手機</h2>
        <p id="night-prompt">準備進入你的夜間行動</p>
        <button onclick="startNightAction()">開始行動</button>
    </div>

    <div id="action-screen" class="hidden">
        <h2 id="action-title">夜間行動中</h2>
        <div id="action-form"></div>
        <div id="action-result" class="hidden"></div>
        <button onclick="submitNightAction()">完成行動並鎖定</button>
    </div>

    <div id="day-screen" class="hidden">
        <h1 id="day-round-title">☀️ 天亮請睜眼</h1>
        <div class="role-card" id="day-result" style="border-color: #e63946;"></div>
        <h3>昨晚事件記錄（明牌提示）：</h3>
        <div class="log-box" id="day-logs"></div>
        
        <!-- 白天放逐投票區 -->
        <div id="vote-section" style="margin-top: 20px; border-top: 1px solid #457b9d; padding-top: 15px;">
            <h3>🗳️ 白天放逐投票</h3>
            <p>請在討論後，選擇被投票放逐的玩家（如果平安日請選「無人被放逐」）：</p>
            <div id="vote-select-container"></div>
            <button onclick="executeExile()" style="background-color: #457b9d;">確認放逐此玩家</button>
        </div>
        
        <button onclick="restartGame()" style="background-color: #555; font-size: 13px; padding: 8px;">重新開始全新對局</button>
    </div>
</div>

<script>
    const ROLES_POOL = ['狼人', '狼人', '狼人', '預言家', '女巫', '叛徒', '調停者', '平民', '平民', '平民'];
    let players = []; 
    let currentSetupIndex = 0;
    let currentNightIndex = 0;
    let gameRound = 1; // 記錄天數

    // 全局狀態
    let witchHasHeal = true;
    let witchHasPoison = true;
    let mediatorHasSkill = true; 
    let traitorAwakened = false; 

    let nightData = {
        wolfTarget: null,
        seerTarget: null,
        witchHeal: false,
        witchPoison: null,
        mediatorTarget1: null,
        mediatorTarget2: null
    };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }
    const shuffledRoles = shuffle([...ROLES_POOL]);

    function lockInPlayer() {
        const nameInput = document.getElementById('player-name');
        const name = nameInput.value.trim() || `玩家 ${currentSetupIndex + 1}`;
        
        players.push({
            id: currentSetupIndex + 1,
            name: name,
            role: shuffledRoles[currentSetupIndex],
            alive: true // 新增：存活狀態
        });

        nameInput.value = '';
        showPrivacyScreen(currentSetupIndex, 'setup');
    }

    function showPrivacyScreen(currentIndex, mode) {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('role-screen').classList.add('hidden');
        document.getElementById('night-screen').classList.add('hidden');
        document.getElementById('action-screen').classList.add('hidden');
        
        const privacy = document.getElementById('privacy-screen');
        const targetText = document.getElementById('privacy-target');
        privacy.classList.remove('hidden');

        if (mode === 'setup') {
            if (currentIndex < 9) {
                targetText.innerText = `請將手機交給 ${currentIndex + 2} 號玩家`;
                privacy.querySelector('button').setAttribute('onclick', 'revealRoleScreen()');
            } else {
                targetText.innerText = `所有人抽牌完畢！請將手機交回 1 號玩家，準備進入天黑`;
                privacy.querySelector('button').setAttribute('onclick', 'goToNightPhase()');
            }
        } else if (mode === 'night') {
            // 自動尋找下一個「還活著」的玩家，死人直接跳過
            let nextAliveIndex = currentIndex + 1;
            while (nextAliveIndex < 10 && !players[nextAliveIndex].alive) {
                nextAliveIndex++;
            }

            if (nextAliveIndex < 10) {
                targetText.innerText = `請將手機交給下一個順位：${players[nextAliveIndex].name}`;
                currentNightIndex = nextAliveIndex - 1; // 設定指標
                privacy.querySelector('button').setAttribute('onclick', 'revealNightScreen()');
            } else {
                targetText.innerText = `所有人行動完畢！請點擊查看天亮結算結果`;
                privacy.querySelector('button').setAttribute('onclick', 'processDaybreak()');
            }
        }
    }

    function revealRoleScreen() {
        document.getElementById('privacy-screen').classList.add('hidden');
        const screen = document.getElementById('role-screen');
        screen.classList.remove('hidden');
        
        document.getElementById('role-owner-name').innerText = `${players[currentSetupIndex].name} 的身分`;
        const card = document.getElementById('role-card-display');
        card.innerText = players[currentSetupIndex].role;
        card.classList.add('hidden');
        
        document.getElementById('btn-toggle-role').classList.remove('hidden');
        document.getElementById('btn-role-done').classList.add('hidden');
    }

    function toggleRoleVisibility() {
        const card = document.getElementById('role-card-display');
        card.classList.toggle('hidden');
        document.getElementById('btn-role-done').classList.remove('hidden');
    }

    function nextPlayerRole() {
        currentSetupIndex++;
        if (currentSetupIndex < 10) {
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('player-setup-title').innerText = `請 ${currentSetupIndex + 1} 號玩家拿著手機`;
        }
    }

    function goToNightPhase() {
        document.getElementById('privacy-screen').classList.add('hidden');
        document.getElementById('night-screen').classList.remove('hidden');
        document.getElementById('night-round-title').innerText = `🌙 第 ${gameRound} 晚天黑請閉眼`;
        
        // 尋找第一個活著的人
        currentNightIndex = 0;
        while (currentNightIndex < 10 && !players[currentNightIndex].alive) {
            currentNightIndex++;
        }
        updateNightScreenFields();
    }

    function updateNightScreenFields() {
        document.getElementById('night-player-title').innerText = `請 ${players[currentNightIndex].name} 拿著手機`;
        document.getElementById('night-prompt').innerText = `確認周圍無人後，點擊按鈕開始你的夜間行動。`;
    }

    function revealNightScreen() {
        currentNightIndex++;
        document.getElementById('privacy-screen').classList.add('hidden');
        document.getElementById('night-screen').classList.remove('hidden');
        updateNightScreenFields();
    }

    // 只生成「還活著」的玩家選單
    function generatePlayerSelect(id, placeholder) {
        let html = `<select id="${id}"><option value="">-- ${placeholder} --</option>`;
        players.forEach(pl => {
            if (pl.alive) {
                html += `<option value="${pl.id}">${pl.id}號 - ${pl.name}</option>`;
            } else {
                html += `<option value="${pl.id}" disabled class="dead-player">${pl.id}號 - ${pl.name} (已死亡)</option>`;
            }
        });
        html += `</select>`;
        return html;
    }

    function startNightAction() {
        document.getElementById('night-screen').classList.add('hidden');
        const actionScreen = document.getElementById('action-screen');
        actionScreen.classList.remove('hidden');

        const p = players[currentNightIndex];
        let displayRole = p.role;
        if (p.role === '叛徒') {
            displayRole = traitorAwakened ? '叛徒 (🔥已覺醒為狼人)' : '叛徒 (🕊️未覺醒・好人)';
        }

        document.getElementById('action-title').innerText = `${p.name} (身分: ${displayRole})`;
        
        const formDiv = document.getElementById('action-form');
        const resultDiv = document.getElementById('action-result');
        formDiv.innerHTML = '';
        resultDiv.innerHTML = '';
        resultDiv.classList.add('hidden');

        // 介面渲染
        if (p.role === '狼人' || (p.role === '叛徒' && traitorAwakened)) {
            formDiv.innerHTML = `<div class="skill-desc">🐺 <strong>狼人行動：</strong>商討後選擇今晚襲擊目標。</div>` + generatePlayerSelect('wolf-select', '選擇擊殺目標（或空刀）');
        } 
        else if (p.role === '預言家') {
            formDiv.innerHTML = `<div class="skill-desc">🔮 <strong>預言家：</strong>選擇查驗一名活著的玩家。</div>` + generatePlayerSelect('seer-select', '選擇查驗目標') + 
            `<button type="button" style="background:#457b9d; margin-top:10px;" onclick="checkSeerIdentity()">立刻執行查驗</button>`;
        } 
        else if (p.role === '女巫') {
            let witchHtml = `<div class="skill-desc">🧪 <strong>女巫（注意：同一晚最多只能使用一瓶藥）：</strong></div>`;
            
            if (witchHasHeal) {
                let victimText = nightData.wolfTarget ? `${nightData.wolfTarget} 號玩家` : '無人被殺';
                witchHtml += `<p>🦉 昨晚被襲擊的是：<strong style="color:#e63946">${victimText}</strong></p>
                              <p>是否使用【解藥】？</p>
                              <select id="witch-heal-select" onchange="toggleWitchOptions('heal')">
                                <option value="no">否</option>
                                <option value="yes">是</option>
                              </select>`;
            }

            if (witchHasPoison) {
                witchHtml += `<div id="witch-poison-box"><p>是否使用【毒藥】毒殺玩家？</p>` + generatePlayerSelect('witch-poison-select', '不使用毒藥') + `</div>`;
            }
            formDiv.innerHTML = witchHtml;
        } 
        else if (p.role === '調停者') {
            if (mediatorHasSkill) {
                formDiv.innerHTML = `
                    <div class="skill-desc">⚖️ <strong>調停者：</strong>全場限一次，指定兩名玩家白天不得互投。</div>
                    <select id="mediator-use-select" onchange="toggleMediatorFields(this.value)">
                        <option value="no">否，今晚不使用</option>
                        <option value="yes">是，今晚發動技能</option>
                    </select>
                    <div id="mediator-targets" class="hidden" style="margin-top: 15px;">
                        <p>指定玩家 A：</p>${generatePlayerSelect('mediator-t1', '選擇玩家 A')}
                        <p>指定玩家 B：</p>${generatePlayerSelect('mediator-t2', '選擇玩家 B')}
                    </div>`;
            } else {
                formDiv.innerHTML = `<p style="color:#888;">你的調停技能已使用過，閉眼休息...</p>`;
            }
        } 
        else {
            formDiv.innerHTML = `<p style="color:#a8dadc; font-style:italic;">你今晚平安無事，閉眼休息中...</p>`;
        }
    }

    // 核心新增：女巫雙藥互斥邏輯（一晚最多一瓶）
    function toggleWitchOptions(type) {
        if (!witchHasPoison) return;
        const healVal = document.getElementById('witch-heal-select').value;
        const poisonBox = document.getElementById('witch-poison-box');
        
        if (healVal === 'yes') {
            // 如果選了用解藥，就把毒藥隱藏並重設為不毒
            poisonBox.classList.add('hidden');
            document.getElementById('witch-poison-select').value = "";
        } else {
            poisonBox.classList.remove('hidden');
        }
    }

    function toggleMediatorFields(val) {
        document.getElementById('mediator-targets').classList.toggle('hidden', val !== 'yes');
    }

    function checkSeerIdentity() {
        const targetId = document.getElementById('seer-select').value;
        const resultDiv = document.getElementById('action-result');
        if (!targetId) return alert('請先選擇一個目標！');
        
        const targetPlayer = players.find(pl => pl.id == targetId);
        let isEvil = targetPlayer.role === '狼人' || (targetPlayer.role === '叛徒' && traitorAwakened);
        
        resultDiv.className = "result-badge";
        resultDiv.classList.remove('hidden');
        resultDiv.innerHTML = `查驗結果：${targetPlayer.id}號是 <strong style="color:${isEvil ? '#e63946':'#4ade80'}">${isEvil ? '壞人' : '好人'}</strong>`;
        nightData.seerTarget = targetId;
    }

    function submitNightAction() {
        const p = players[currentNightIndex];

        if (p.role === '狼人' || (p.role === '叛徒' && traitorAwakened)) {
            const val = document.getElementById('wolf-select').value;
            if (val) nightData.wolfTarget = parseInt(val);
        } 
        else if (p.role === '預言家') {
            const val = document.getElementById('seer-select').value;
            if (val) nightData.seerTarget = parseInt(val);
        } 
        else if (p.role === '女巫') {
            if (witchHasHeal) {
                const healVal = document.getElementById('witch-heal-select').value;
                if (healVal === 'yes') {
                    nightData.witchHeal = true;
                    witchHasHeal = false; 
                }
            }
            // 只有在沒用解藥的情況下，才收毒藥數據
            if (witchHasPoison && !nightData.witchHeal) {
                const poisonVal = document.getElementById('witch-poison-select').value;
                if (poisonVal) {
                    nightData.witchPoison = parseInt(poisonVal);
                    witchHasPoison = false; 
                }
            }
        }
        else if (p.role === '調停者' && mediatorHasSkill) {
            const useSkill = document.getElementById('mediator-use-select').value;
            if (useSkill === 'yes') {
                const t1 = document.getElementById('mediator-t1').value;
                const t2 = document.getElementById('mediator-t2').value;
                if (t1 && t2 && t1 !== t2) {
                    nightData.mediatorTarget1 = parseInt(t1);
                    nightData.mediatorTarget2 = parseInt(t2);
                    mediatorHasSkill = false; 
                } else if (t1 === t2 && t1 !== "") {
                    return alert('調停對象不能是同一個人！');
                }
            }
        }

        showPrivacyScreen(currentNightIndex, 'night');
    }

    // 天亮結算
    function processDaybreak() {
        document.getElementById('privacy-screen').classList.add('hidden');
        document.getElementById('day-screen').classList.remove('hidden');
        document.getElementById('day-round-title').innerText = `☀️ 第 ${gameRound} 天天亮請睜眼`;

        let deaths = [];
        let logText = "";
        let traitorStatusChanged = false;

        // 1. 狼刀與解藥
        if (nightData.wolfTarget) {
            let victim = players.find(pl => pl.id === nightData.wolfTarget);
            if (nightData.witchHeal) {
                logText += `• 狼人試圖襲擊 ${nightData.wolfTarget} 號，被女巫用解藥救活了。<br>`;
                if (victim && victim.role === '叛徒' && !traitorAwakened) {
                    traitorAwakened = true;
                    traitorStatusChanged = true;
                }
            } else {
                deaths.push(nightData.wolfTarget);
                logText += `• 狼人成功襲擊了 ${nightData.wolfTarget} 號玩家。<br>`;
            }
        } else {
            logText += `• 狼人今晚空刀。<br>`;
        }

        // 2. 毒藥
        if (nightData.witchPoison) {
            deaths.push(nightData.witchPoison);
            logText += `• 女巫使用毒藥毒殺了 ${nightData.witchPoison} 號玩家。<br>`;
        }

        // 3. 調停者
        if (nightData.mediatorTarget1 && nightData.mediatorTarget2) {
            logText += `<span style="color:#f1faee; background:#457b9d; padding:2px 6px; border-radius:4px;">📢 <b>調停限制：</b> ${nightData.mediatorTarget1}號 與 ${nightData.mediatorTarget2}號 <b>今天白天不得互相投票</b>！</span><br>`;
        }

        // 4. 叛徒覺醒公告
        if (traitorStatusChanged) {
            let traitor = players.find(pl => pl.role === '叛徒');
            logText += `<span style="color:#e63946; font-weight:bold;">🔥 <b>陣營轉換：</b> ${traitor.id}號 (${traitor.name}) 覺醒並加入【狼人陣營】！</span><br>`;
        }

        // 執行玩家死亡更新
        let uniqueDeaths = [...new Set(deaths)].sort((a, b) => a - b);
        uniqueDeaths.forEach(id => {
            let p = players.find(pl => pl.id === id);
            if(p) p.alive = false;
        });

        // 渲染死亡結果
        const resultCard = document.getElementById('day-result');
        if (uniqueDeaths.length === 0) {
            resultCard.innerText = "✨ 昨晚是個平安夜，無人死亡！";
            resultCard.style.borderColor = "#4ade80";
        } else {
            let deathNames = uniqueDeaths.map(id => {
                let found = players.find(pl => pl.id === id);
                return `${id}號 (${found.name} - 底牌: ${found.role})`;
            }).join('、');
            resultCard.innerHTML = `💀 昨晚死亡的玩家為：<br><span style="font-size:18px; color:#e63946;">${deathNames}</span>`;
            resultCard.style.borderColor = "#e63946";
        }

        document.getElementById('day-logs').innerHTML = logText || "什麼都沒發生。";

        // 檢查陣營勝負
        if (checkGameOver()) return;

        // 渲染白天放逐下拉選單
        renderVoteSelect();
    }

    // 建立白天投票選單
    function renderVoteSelect() {
        const container = document.getElementById('vote-select-container');
        let html = `<select id="exile-select"><option value="0">-- 無人被放逐（平安日） --</option>`;
        players.forEach(pl => {
            if (pl.alive) {
                html += `<option value="${pl.id}">${pl.id}號 - ${pl.name}</option>`;
            }
        });
        html += `</select>`;
        container.innerHTML = html;
        document.getElementById('vote-section').classList.remove('hidden');
    }

    // 執行白天放逐，並自動切換到下一晚
    function executeExile() {
        const targetId = parseInt(document.getElementById('exile-select').value);
        
        if (targetId !== 0) {
            let p = players.find(pl => pl.id === targetId);
            p.alive = false;
            alert(`${p.id}號 (${p.name} - 底牌: ${p.role}) 已被放逐投出！`);
        } else {
            alert(`今天白天為平安日，無人被放逐。`);
        }

        // 檢查勝負，若遊戲未結束，則推進到下一晚
        if (!checkGameOver()) {
            gameRound++;
            // 重設單夜夜間數據
            nightData = { wolfTarget: null, seerTarget: null, witchHeal: false, witchPoison: null, mediatorTarget1: null, mediatorTarget2: null };
            
            // 跳回夜間準備畫面
            document.getElementById('day-screen').classList.add('hidden');
            goToNightPhase();
        }
    }

    // 判斷遊戲是否分出勝負（核心新邏輯）
    function checkGameOver() {
        // 計算活著的狼人與好人人數
        let aliveWolves = 0;
        let aliveGood = 0;

        players.forEach(p => {
            if (p.alive) {
                // 如果是狼人，或者是「已經覺醒的叛徒」，算作狼人陣營
                if (p.role === '狼人' || (p.role === '叛徒' && traitorAwakened)) {
                    aliveWolves++;
                } else {
                    aliveGood++;
                }
            }
        });

        const resultCard = document.getElementById('day-result');

        // 勝負規則
        if (aliveWolves === 0) {
            resultCard.innerHTML = `🎉 <b>遊戲結束：【好人陣營獲勝】！</b><br>所有狼人已被全數消滅。`;
            resultCard.style.borderColor = "#4ade80";
            document.getElementById('vote-section').classList.add('hidden');
            return true;
        } 
        if (aliveWolves >= aliveGood) {
            resultCard.innerHTML = `🔥 <b>遊戲結束：【狼人陣營獲勝】！</b><br>狼人人數已大於或等於好人人數。`;
            resultCard.style.borderColor = "#e63946";
            document.getElementById('vote-section').classList.add('hidden');
            return true;
        }
        return false;
    }

    function restartGame() {
        if(confirm('確認要清除目前的對局，重新開始一局新遊戲嗎？')) {
            window.location.reload();
        }
    }
</script>
</body>
</html>
